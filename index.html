<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="apple-mobile-web-app-capable" content="yes"> 
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="icon" type="images/png" sizes="192x192" href="images/icon-192.png">
  <link rel="icon" type="images/png" sizes="512x512" href="images/icon-512.png">
  <link href="css/lib/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <title>Trail Weather</title>
</head>
<body class="bg-dark">
  <!-- Header -->
  <!-- Main Section -->
  <div class="container vh-100 d-flex flex-column justify-content-center align-items-center">
    <!-- If the user enters an invalid city, this displays -->
    <div id="txtError" class="text-danger mb-3 d-none" role="alert" aria-live="assertive">
      City not found. Please try another location.
    </div>
    <!-- Input Section -->
    <div class="input-group mb-3 w-75 mx-auto">
      <label for="txtCity" class="visually-hidden"> Enter city name.</label>
      <input type="text" id="txtCity" class="form-control" placeholder="Enter city name" aria-label="City Name">
      <button class="btn btn-primary" id="btnSearch" aria-label="Search Weather for entered city">Search</button>
    </div>
    <!-- City Selection (If more than one match) -->
    <div id="divSelCity" class="mb-3 d-none">
      <label for="selCity" class="form-label"> Multiple cities found, please select:</label>
      <select id="selCity" class="form-select"></select>
      <button id="btnSelCity" class="btn btn-primary mt-2">Select City</button>
    </div>
    <!-- Weather Card -->
    <div class="card text-center p-4 w-75 d-none" id="divWeatherCard" aria-label="Current weather conditions">
      
      <div class="mb-3">
        <h3 id="txtCityName" class="mb-2"></h3>
        <i id="iconWeather" class="bi bi-cloud-sun display-1" aria-hidden="true"></i>
        <h2 id="txtTemp">72°F</h2>
        <p id="txtFeelsLike"> Feels like 74°F</p>
      </div>

      <!-- Stats -->
      <div class="row text-center mb-3">
        <div class="col-6 col-md-4 mb-2">
          <i id="iconHumid" class="bi bi-droplet" aria-hidden="true"></i>
          Humidity: <span id="txtHumidity" aria-label="Humidity">55%</span>
        </div>
        <div class="col-6 col-md-4 mb-2">
          <i id="iconWind" class="bi bi-wind" aria-hidden="true"></i>
          Wind: <span id="txtWind" aria-label="Wind Speed">8 mph</span>
        </div>
        <div class="col-6 col-md-4 mb-2">
          <i id="iconUmbrella" class="bi bi-umbrella" aria-hidden="true"></i>
          Rain: <span id="txtRain" aria-label="chance of rain">10%</span>
        </div>
      </div>
      <!-- Reccomendations -->
      <div class="alert alert-info" id="txtAdvice" role="status" aria-live="polite">
        Great conditions for a hike.
      </div>
    </div>
    <!-- Footer -->
    <footer class="mt-4 text-center text-light">
      Data courtesy of <a href="https://open-meteo.com/en/docs" target="_blank">Open-Meteo</a>.
    </footer>
  </div>
</body>
<script src="js/lib/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</html>
