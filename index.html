<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="css/lib/bootstrap.min.css" rel="stylesheet">
  <link href="css/lib/bootstrap-icons.min.css" rel="stylesheet">
  <title></title>
</head>
<body class="bg-dark">
  <!-- Header -->
  <!-- Main Section -->
  <div class="container vh-100 d-flex flex-column justify-content-center align-item-center">
    <!-- Input Section -->
    <div class="input-group mb-3 w-75">
      <label for="txtCity" class="visually-hidden"> Enter city name.</label>
      <input type="text" id="txtCity" class="form-control" placeholder="Enter city name" aria-label="City Name">
      <button class="btn btn-primary" id="btnSearch" aria-label="Search Weather for entered city"> Search</button>
    </div>

    <!-- Weather Card -->
    <div class="card text-center p-4 w-75 d-none" id="divWeatherCard" aria-label="Current weather conditions">
      <div class="mb-3">
        <i id="iconWeather" class="bi bi-cloud-sun display-1" aria-hidden="true"></i>
        <h2 id="txtTemp">72°F</h2>
        <p id="txtFeelsLike"> Feels like 74°F</p>
      </div>

      <!-- Stats -->
      <div class="row text-center mb-3">
        <div class="col-6 col-md-4 mb-2">
          <i id="iconHumid" class="bi bi-droplet" aria-hidden="true"></i>
          Humidity: <span id="txtHumidity" aria-label="Humidity">55%</span>
        </div>
        <div class="col-6 col-md-4 mb-2">
          <i id="iconWind" class="bi bi-wind" aria-hidden="true"></i>
          Wind: <span id="txtWind" aria-label="Wind Speed">8 mph</span>
        </div>
        <div class="col-6 col-md-4 mb-2">
          <i id="iconUmbrella" aria-hidden="true"></i>
          Rain: <span id="txtRain" aria-label="chance of rain">10%</span>
        </div>
      </div>
      <!-- Reccomendations -->
      <div class="alert alert-info" id="txtAdvice" role="status" aria-live="polite">
        Great conditions for a hike.
      </div>
    </div>
    <!-- Footer -->
    <footer class="mt-4 text-center">
      Data courtesy of <a href="https://open-meteo.com/en/docs" target="_blank">Open-Meteo</a>
    </footer>
  </div>
</body>
<script src="js/lib/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</html>
